<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bola 8 Mágica</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎱 Bola 8 Mágica (JS)</h1>
        <p class="subtitle">Realiza una pregunta de sí o no y descubre tu destino</p>

        <div class="ball">
            <div class="answer-window">
            </div>
        </div>

        <form id="magicBallForm">
            <div class="input-group">
                <input 
                    type="text" 
                    id="pregunta"
                    name="pregunta" 
                    placeholder="Escribe tu pregunta aquí..." 
                    required
                >
            </div>
            <button type="submit">Consultar a la Bola</button>
        </form>
        <p class="author">JUAN MORALES PÁRRAGA FETCH</p>
    </div>
</body>
</html>
